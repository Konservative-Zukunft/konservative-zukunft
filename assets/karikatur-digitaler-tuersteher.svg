<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Karikatur: Der digitale Türsteher</title>
  <desc id="desc">Ein übergroßes Mobiltelefon dient als Kontrolltor. Ein EU-Türsteher verlangt einen Altersnachweis, während ein Bürger seinen Ausweis hochhält.</desc>
  <rect width="1200" height="800" fill="#f5f3ed"/>
  <rect x="0" width="1200" height="88" fill="#101214"/>
  <text x="54" y="57" fill="#ffffff" font-family="Manrope,Arial,sans-serif" font-size="26" font-weight="800" letter-spacing="2">DER DIGITALE TÜRSTEHER</text>
  <rect x="458" y="135" width="330" height="560" rx="40" fill="#101214"/>
  <rect x="486" y="187" width="274" height="430" rx="8" fill="#ffffff"/>
  <circle cx="623" cy="657" r="17" fill="#6d7074"/>
  <rect x="528" y="230" width="190" height="190" rx="95" fill="#1f4aa8"/>
  <circle cx="623" cy="325" r="63" fill="none" stroke="#f2c94c" stroke-width="8" stroke-dasharray="5 15"/>
  <text x="623" y="337" fill="#ffffff" text-anchor="middle" font-family="Manrope,Arial,sans-serif" font-size="38" font-weight="800">EU</text>
  <text x="623" y="472" fill="#101214" text-anchor="middle" font-family="Manrope,Arial,sans-serif" font-size="22" font-weight="800">ALTER NACHWEISEN</text>
  <rect x="538" y="505" width="170" height="58" rx="4" fill="#b5122b"/>
  <text x="623" y="542" fill="#ffffff" text-anchor="middle" font-family="Manrope,Arial,sans-serif" font-size="18" font-weight="800">ZUGANG PRÜFEN</text>

  <circle cx="905" cy="292" r="46" fill="#d2a72c" stroke="#101214" stroke-width="7"/>
  <path d="M862 350 Q905 323 948 350 L970 530 L840 530 Z" fill="#1f4aa8" stroke="#101214" stroke-width="7"/>
  <path d="M858 380 L774 438" stroke="#101214" stroke-width="18" stroke-linecap="round"/>
  <rect x="715" y="410" width="92" height="58" fill="#ffffff" stroke="#101214" stroke-width="6" transform="rotate(-12 761 439)"/>
  <text x="761" y="444" fill="#b5122b" text-anchor="middle" font-family="Manrope,Arial,sans-serif" font-size="13" font-weight="800" transform="rotate(-12 761 439)">ID?</text>

  <circle cx="270" cy="340" r="42" fill="#ffffff" stroke="#101214" stroke-width="7"/>
  <path d="M220 395 Q270 365 320 395 L350 600 L190 600 Z" fill="#b5122b" stroke="#101214" stroke-width="7"/>
  <path d="M314 425 L433 392" stroke="#101214" stroke-width="17" stroke-linecap="round"/>
  <rect x="380" y="340" width="96" height="62" fill="#ffffff" stroke="#101214" stroke-width="6" transform="rotate(-8 428 371)"/>
  <text x="428" y="376" fill="#101214" text-anchor="middle" font-family="Manrope,Arial,sans-serif" font-size="13" font-weight="800" transform="rotate(-8 428 371)">18+</text>

  <path d="M96 686 H1104" stroke="#101214" stroke-width="6"/>
  <text x="600" y="754" fill="#101214" text-anchor="middle" font-family="Source Serif 4,Georgia,serif" font-size="27">„Nur das Alter“, sagt der Türsteher. Die Infrastruktur kann später mehr.</text>
</svg>
