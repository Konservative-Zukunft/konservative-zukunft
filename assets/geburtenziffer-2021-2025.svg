<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Geburtenziffer in Deutschland 2021 bis 2025</title>
  <desc id="desc">Die zusammengefasste Geburtenziffer sank von 1,58 Kindern je Frau im Jahr 2021 auf 1,32 im Jahr 2025.</desc>
  <rect width="1200" height="760" fill="#f5f3ed"/>
  <rect x="0" y="0" width="400" height="8" fill="#111111"/><rect x="400" y="0" width="400" height="8" fill="#b5122b"/><rect x="800" y="0" width="400" height="8" fill="#d2a72c"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="76" y="88" fill="#b5122b" font-size="22" font-weight="700" letter-spacing="5">DEMOGRAFIE</text>
    <text x="76" y="150" fill="#101214" font-size="52" font-weight="800">Fünf Jahre. Ein klares Gefälle.</text>
    <text x="76" y="196" fill="#62666a" font-size="24">Zusammengefasste Geburtenziffer, Kinder je Frau</text>

    <g stroke="#d7d4cc" stroke-width="2">
      <line x1="126" y1="296" x2="1100" y2="296"/><line x1="126" y1="391" x2="1100" y2="391"/><line x1="126" y1="486" x2="1100" y2="486"/>
    </g>
    <g fill="#777b7f" font-size="18">
      <text x="92" y="303">1,60</text><text x="92" y="398">1,45</text><text x="92" y="493">1,30</text>
    </g>

    <path d="M160 309 L390 385 L620 436 L850 455 L1080 474" fill="none" stroke="#b5122b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#101214" stroke="#d2a72c" stroke-width="7">
      <circle cx="160" cy="309" r="13"/><circle cx="390" cy="385" r="13"/><circle cx="620" cy="436" r="13"/><circle cx="850" cy="455" r="13"/><circle cx="1080" cy="474" r="13"/>
    </g>
    <g fill="#101214" font-size="25" font-weight="800" text-anchor="middle">
      <text x="160" y="274">1,58</text><text x="390" y="350">1,46</text><text x="620" y="401">1,38</text><text x="850" y="420">1,35</text><text x="1080" y="439">1,32</text>
    </g>
    <g fill="#62666a" font-size="20" font-weight="700" text-anchor="middle">
      <text x="160" y="535">2021</text><text x="390" y="535">2022</text><text x="620" y="535">2023</text><text x="850" y="535">2024</text><text x="1080" y="535">2025</text>
    </g>

    <rect x="76" y="588" width="1048" height="1" fill="#c8c5bd"/>
    <text x="76" y="641" fill="#101214" font-size="26" font-weight="700">Von 1,58 auf 1,32: Rückgang um 0,26 binnen vier Jahren.</text>
    <text x="76" y="694" fill="#777b7f" font-size="17">Quelle: Statistisches Bundesamt, Tabelle „Zusammengefasste Geburtenziffer nach Kalenderjahren“, Stand 1. Juli 2026.</text>
    <text x="1124" y="728" fill="#b5122b" font-size="16" font-weight="700" text-anchor="end" letter-spacing="2">KONSERVATIVE ZUKUNFT</text>
  </g>
</svg>
